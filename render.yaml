services:
  - name: caseforge-api
    plan: free
    type: web
    runtime: docker
    repo: https://github.com/shuwangs/CaseForge.git
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLICATION_API
        value: "https://api.opencitations.net/meta/v1/author/orcid:"

  - name: caseforge-web
    plan: free
    type: web
    runtime: docker
    repo: https://github.com/shuwangs/CaseForge.git
    rootDir: client
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_BASE_URL
        value: https://caseforge-api.onrender.com
